<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Remind Me</title>
    <style>
        :root { 
            --bg: #0f172a; --card: #1e293b; --text: #f8fafc; 
            --text-muted: #94a3b8; --accent: #3b82f6; --accent-hover: #2563eb;
            --danger: #ef4444; --success: #10b981;
        }
        * { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 15px; }
        .app-container { background: var(--card); padding: 25px; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); width: 100%; max-width: 450px; }
        
        h1 { text-align: center; margin-top: 0; margin-bottom: 20px; font-size: 28px; font-weight: 800; color: #fff; }
        
        /* Tab Navigation */
        .tabs { display: flex; background: #0f172a; padding: 5px; border-radius: 12px; margin-bottom: 25px; }
        .tab-btn { flex: 1; background: transparent; color: var(--text-muted); border: none; padding: 12px; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 15px; transition: all 0.2s; -webkit-tap-highlight-color: transparent; }
        .tab-btn.active { background: var(--accent); color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Forms & Inputs */
        label { display: block; margin: 12px 0 6px; font-size: 13px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        input, select { width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; font-size: 16px; outline: none; appearance: none; -webkit-appearance: none; }
        input:focus { border-color: var(--accent); }
        
        /* Grid for Timer Inputs - iPhone Overflow Fix */
        .timer-inputs { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 12px; width: 100%; }
        .timer-inputs div { width: 100%; min-width: 0; }
        .sub-label { display: block; font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 4px; letter-spacing: 0.5px; text-align: center; }
        .timer-inputs input { margin-bottom: 0; text-align: center; width: 100%; padding: 12px 5px; }

        button.main-btn { width: 100%; padding: 14px; background: var(--accent); color: white; border: none; font-weight: 600; border-radius: 10px; cursor: pointer; font-size: 16px; margin-top: 5px; transition: background 0.2s; -webkit-tap-highlight-color: transparent; }
        button.main-btn:hover { background: var(--accent-hover); }
        
        /* List Layout for Alarms */
        .list-title { font-size: 14px; font-weight: 600; color: var(--text-muted); margin: 25px 0 10px; text-transform: uppercase; }
        .reminder-list { display: flex; flex-direction: column; gap: 10px; max-height: 200px; overflow-y: auto; }
        .reminder-item { display: flex; justify-content: space-between; align-items: center; background: #0f172a; padding: 12px 16px; border-radius: 10px; border-left: 4px solid var(--accent); }
        .reminder-info { display: flex; flex-direction: column; }
        .reminder-text { font-weight: 500; font-size: 15px; }
        .reminder-time { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
        .delete-btn { background: transparent; border: none; color: var(--danger); font-size: 18px; cursor: pointer; padding: 5px; }
        
        .empty-state { text-align: center; color: var(--text-muted); font-size: 14px; padding: 15px 0; }
        .audio-hint { font-size: 11px; color: var(--text-muted); text-align: center; margin-top: 12px; }
    </style>
</head>
<body>

<div class="app-container">
    <h1>Remind Me</h1>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('alarms-tab', this)">Alarms</button>
        <button class="tab-btn" onclick="switchTab('timer-tab', this)">Timer</button>
    </div>

    <div id="alarms-tab" class="tab-content active">
        <label for="alarmText">Reminder!</label>
        <input type="text" id="alarmText" placeholder="e.g. Check the oven">
        
        <label for="alarmTime">At what time?</label>
        <input type="datetime-local" id="alarmTime">
        
        <button class="main-btn" onclick="addAlarm()">Add Voice Alarm</button>
    </div>

    <div id="timer-tab" class="tab-content">
        <label for="timerText">Reminder!</label>
        <input type="text" id="timerText" placeholder="e.g. Check the oven">
        
        <label>Countdown Duration</label>
        <div class="timer-inputs">
            <div>
                <span class="sub-label">Hours</span>
                <input type="number" id="timerHr" placeholder="0" min="0" value="0">
            </div>
            <div>
                <span class="sub-label">Minutes</span>
                <input type="number" id="timerMin" placeholder="0" min="0" max="59" value="0">
            </div>
            <div>
                <span class="sub-label">Seconds</span>
                <input type="number" id="timerSec" placeholder="10" min="0" max="59" value="10">
            </div>
        </div>
        
        <button class="main-btn" onclick="addCountdown()">Start Countdown</button>
    </div>

    <div class="list-title">Active Reminders</div>
    <div id="reminderQueue" class="reminder-list">
        <div class="empty-state">No reminders set yet</div>
    </div>
    
    <p class="audio-hint">🔊 Turn off silent switch. Leave app running in browser background.</p>
</div>

<audio id="silentHacks" loop src="data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAAAD"></audio>

<script>
    let remindersArr = [];
    let speechEngineUnlocked = false;
    
    // Check loop running continuously every second
    setInterval(() => {
        const now = new Date().getTime();
        let changed = false;

        remindersArr.forEach((rem, idx) => {
            if (now >= rem.targetTime) {
                speakText(rem.message);
                remindersArr.splice(idx, 1);
                changed = true;
            }
        });

        if (changed) {
            renderQueue();
            manageBackgroundLock();
        }
    }, 1000);

    // Forces iOS to register voice capabilities immediately upon clicking a setup button
    function unlockSpeechEngine() {
        if (!speechEngineUnlocked) {
            const initialSilence = new SpeechSynthesisUtterance("");
            window.speechSynthesis.speak(initialSilence);
            speechEngineUnlocked = true;
        }
    }

    function speakText(text) {
        const speech = new SpeechSynthesisUtterance(text);
        const containsChinese = /[\u4e00-\u9fa5]/.test(text);
        
        if (containsChinese) {
            speech.lang = 'zh-HK';
            const voices = window.speechSynthesis.getVoices();
            const hkVoice = voices.find(v => v.lang.includes('zh-HK') || v.lang.includes('zh_HK'));
            if (hkVoice) speech.voice = hkVoice;
        } else {
            speech.lang = 'en-US';
        }
        
        // Force speech queue execution
        window.speechSynthesis.cancel(); 
        window.speechSynthesis.speak(speech);
    }

    // Load available platform system voices ahead of schedule
    if (typeof speechSynthesis !== 'undefined' && speechSynthesis.onvoiceschanged !== undefined) {
        speechSynthesis.onvoiceschanged = window.speechSynthesis.getVoices;
    }

    function switchTab(tabId, btnElement) {
        document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        
        document.getElementById(tabId).classList.add('active');
        btnElement.classList.add('active');
    }

    window.addEventListener('DOMContentLoaded', () => {
        const now = new Date();
        now.setMinutes(now.getMinutes() + 5);
        const localISO = new Date(now.getTime() - now.getTimezoneOffset() * 60000).toISOString().slice(0,16);
        document.getElementById('alarmTime').value = localISO;
        window.speechSynthesis.getVoices();
    });

    function addAlarm() {
        unlockSpeechEngine();
        const text = document.getElementById('alarmText').value.trim() || "Alarm Triggered!";
        const timeVal = document.getElementById('alarmTime').value;

        if (!timeVal) return alert("Please select a valid time.");
        const targetTime = new Date(timeVal).getTime();
        
        if (targetTime <= new Date().getTime()) return alert("Please choose a time in the future!");

        remindersArr.push({
            id: Date.now(),
            message: text,
            targetTime: targetTime,
            displayTime: new Date(targetTime).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
        });

        document.getElementById('alarmText').value = '';
        triggerHardwareWake();
        renderQueue();
    }

    function addCountdown() {
        unlockSpeechEngine();
        const text = document.getElementById('timerText').value.trim() || "Timer completed!";
        const hrs = parseInt(document.getElementById('timerHr').value) || 0;
        const mins = parseInt(document.getElementById('timerMin').value) || 0;
        const secs = parseInt(document.getElementById('timerSec').value) || 0;

        const totalMs = ((hrs * 3600) + (mins * 60) + secs) * 1000;
        if (totalMs <= 0) return alert("Please set a valid duration greater than 0.");

        const targetTime = new Date().getTime() + totalMs;

        let durationLabel = "";
        if (hrs > 0) durationLabel += `${hrs}h `;
        if (mins > 0 || hrs > 0) durationLabel += `${mins}m `;
        durationLabel += `${secs}s`;

        remindersArr.push({
            id: Date.now(),
            message: text,
            targetTime: targetTime,
            displayTime: `In ${durationLabel}`
        });

        document.getElementById('timerText').value = '';
        triggerHardwareWake();
        renderQueue();
    }

    function removeReminder(id) {
        remindersArr = remindersArr.filter(item => item.id !== id);
        renderQueue();
        manageBackgroundLock();
    }

    function renderQueue() {
        const container = document.getElementById('reminderQueue');
        if (remindersArr.length === 0) {
            container.innerHTML = '<div class="empty-state">No reminders set yet</div>';
            return;
        }

        container.innerHTML = remindersArr.map(item => `
            <div class="reminder-item">
                <div class="reminder-info">
                    <span class="reminder-text">${item.message}</span>
                    <span class="reminder-time">🔔 ${item.displayTime}</span>
                </div>
                <button class="delete-btn" onclick="removeReminder(${item.id})">×</button>
            </div>
        `).join('');
    }

    function triggerHardwareWake() {
        const silentAudio = document.getElementById('silentHacks');
        silentAudio.play().catch(() => {});
    }

    function manageBackgroundLock() {
        const silentAudio = document.getElementById('silentHacks');
        if (remindersArr.length === 0) {
            silentAudio.pause();
        }
    }
</script>

</body>
</html>
